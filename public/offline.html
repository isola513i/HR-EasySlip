<!DOCTYPE html>
<html lang="th" data-page="offline">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>EasySlip — ออฟไลน์ / Offline</title>
  <meta name="theme-color" content="#1e3a8a" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #f6f8fa;
      --fg: #10151e;
      --muted: #6b7684;
      --card: #ffffff;
      --border: #e2e7ee;
      --accent: #3d46cc;
      --gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #10151e;
        --fg: #f5f7fa;
        --muted: #9aa4b2;
        --card: #1d2430;
        --border: #2a3240;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: max(env(safe-area-inset-top), 16px) max(env(safe-area-inset-right), 16px) max(env(safe-area-inset-bottom), 16px) max(env(safe-area-inset-left), 16px);
    }
    .card {
      max-width: 380px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(16, 24, 40, 0.06);
    }
    .badge {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--gradient);
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.5px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    .secondary {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    button {
      margin-top: 24px;
      width: 100%;
      min-height: 44px;
      padding: 12px 20px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 120ms;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: translateY(1px); }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #dc2626;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="badge" aria-hidden="true">ES</div>
    <h1>คุณกำลังออฟไลน์</h1>
    <p>ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้ในขณะนี้<br/>กรุณาตรวจสอบสัญญาณแล้วลองใหม่อีกครั้ง</p>
    <p class="secondary"><span class="dot" aria-hidden="true"></span>You are offline. Please check your connection.</p>
    <button type="button" onclick="location.reload()">ลองใหม่ / Retry</button>
  </main>
  <script>
    window.addEventListener("online", () => location.reload());
  </script>
</body>
</html>
